[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect www to non-www (activate when domain is connected)
# [[redirects]]
#   from = "https://www.qlawnlandscaping.com/*"
#   to = "https://qlawnlandscaping.com/:splat"
#   status = 301
#   force = true

# NOTE: No catch-all "/* -> /index.html 200" redirect.
# This is a single static page, not an SPA. That rewrite intercepted the
# Netlify Forms POST (and the /thank-you.html GET), breaking form detection
# and submissions. Netlify serves the static files directly instead.
